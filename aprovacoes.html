<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aprovações – Prestação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-slate-50">
  <div id="app-loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div><p class="text-sm text-slate-500">Carregando…</p></div>
  </div>
  <div id="app" class="hidden flex h-screen overflow-hidden">
    <div id="sidebar-container" class="flex-shrink-0"></div>
    <main class="flex-1 overflow-y-auto">
      <div class="p-6 max-w-7xl mx-auto">

        <div class="mb-6">
          <h1 class="text-2xl font-bold text-slate-900">Aprovações</h1>
          <p class="text-sm text-slate-500 mt-1">Despesas aguardando aprovação</p>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-5">
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Competência</label>
              <input id="f-comp" type="month" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Centro de Custo</label>
              <select id="f-centro" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todos</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Usuário</label>
              <select id="f-usuario" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todos</option>
              </select>
            </div>
            <div class="flex items-end gap-2">
              <button onclick="carregar()" class="flex-1 px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors">Filtrar</button>
              <button onclick="limpar()" class="px-3 py-1.5 border border-slate-300 text-slate-600 rounded-lg text-sm hover:bg-slate-50">Limpar</button>
            </div>
          </div>
        </div>

        <!-- Tabela -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Data</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Usuário</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Fornecedor</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Centro Custo</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Competência</th>
                  <th class="text-right px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Valor</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Anexos</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Ações</th>
                </tr>
              </thead>
              <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <div class="px-4 py-3 border-t border-slate-100 flex items-center justify-between">
            <p class="text-xs text-slate-500" id="total-info">–</p>
            <p class="text-sm font-semibold text-slate-800" id="total-valor">–</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- Modal detalhe / aprovação -->
  <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-900">Detalhe da Despesa</h2>
        <button onclick="fecharModal()" class="text-slate-400 hover:text-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div id="detalhe-content"></div>

        <!-- Seção aprovar/reprovar -->
        <div id="secao-aprovacao" class="border-t border-slate-200 pt-4 space-y-3">
          <div id="motivo-wrap" class="hidden">
            <label class="block text-sm font-medium text-slate-700 mb-1">Motivo da Reprovação *</label>
            <textarea id="motivo-input" rows="3" placeholder="Descreva o motivo…"
              class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-red-400 resize-none"></textarea>
          </div>
          <div class="flex gap-3">
            <button onclick="reprovar()" id="btn-reprovar"
              class="flex-1 px-4 py-2.5 border border-red-300 text-red-700 bg-red-50 hover:bg-red-100 rounded-lg text-sm font-medium transition-colors">
              Reprovar
            </button>
            <button onclick="aprovar()" id="btn-aprovar"
              class="flex-1 px-4 py-2.5 bg-green-600 hover:bg-green-700 text-white rounded-lg text-sm font-medium transition-colors">
              Aprovar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentUser = null;
    let despesaAtual = null;
    let reprovando = false;

    async function carregar() {
      const comp    = document.getElementById('f-comp').value;
      const centroId= document.getElementById('f-centro').value;
      const usrId   = document.getElementById('f-usuario').value;

      let q = supabase
        .from('despesas')
        .select(`id, data_despesa, competencia, fornecedor, valor, status,
                 usuarios!despesas_usuario_id_fkey(id, nome),
                 centros_custo(id, nome),
                 despesa_anexos(id)`)
        .eq('status', 'ENVIADA')
        .order('data_despesa', { ascending: false });

      if (comp)    q = q.eq('competencia', comp);
      if (centroId)q = q.eq('centro_custo_id', centroId);
      if (usrId)   q = q.eq('usuario_id', usrId);

      const { data } = await q;
      const rows = data || [];

      const total = rows.reduce((s, d) => s + Number(d.valor), 0);
      document.getElementById('total-info').textContent  = `${rows.length} despesa(s) pendente(s)`;
      document.getElementById('total-valor').textContent = `Total: ${Utils.formatCurrency(total)}`;

      Utils.renderTable(document.getElementById('tbody'), rows, d => `
        <tr class="hover:bg-slate-50 cursor-pointer" onclick="abrirModal('${d.id}')">
          <td class="px-4 py-3 text-slate-600 whitespace-nowrap">${Utils.formatDate(d.data_despesa)}</td>
          <td class="px-4 py-3 text-slate-800">${d.usuarios?.nome || '–'}</td>
          <td class="px-4 py-3 font-medium text-slate-800">${d.fornecedor}</td>
          <td class="px-4 py-3 text-slate-600 text-xs">${d.centros_custo?.nome || '–'}</td>
          <td class="px-4 py-3 text-slate-600">${Utils.formatCompetencia(d.competencia)}</td>
          <td class="px-4 py-3 text-right font-medium text-slate-900">${Utils.formatCurrency(d.valor)}</td>
          <td class="px-4 py-3 text-slate-600 text-xs">${d.despesa_anexos?.length || 0}</td>
          <td class="px-4 py-3">
            <span class="text-blue-600 text-xs font-medium">Analisar →</span>
          </td>
        </tr>`);
    }

    async function abrirModal(id) {
      reprovando = false;
      document.getElementById('motivo-wrap').classList.add('hidden');
      document.getElementById('motivo-input').value = '';

      const { data } = await supabase
        .from('despesas')
        .select(`*, usuarios!despesas_usuario_id_fkey(nome, email),
                 centros_custo(nome), contas_despesa(nome),
                 cartoes_credito(nome, ultimos_4_digitos),
                 despesa_anexos(id, nome_arquivo, storage_path, tamanho_bytes)`)
        .eq('id', id)
        .single();

      if (!data) return;
      despesaAtual = data;

      document.getElementById('detalhe-content').innerHTML = `
        <div class="grid grid-cols-2 gap-3 text-sm">
          <div><p class="text-xs text-slate-500">Usuário</p><p class="font-medium text-slate-800">${data.usuarios?.nome}</p></div>
          <div><p class="text-xs text-slate-500">E-mail</p><p class="text-slate-700">${data.usuarios?.email}</p></div>
          <div><p class="text-xs text-slate-500">Data da Despesa</p><p class="font-medium text-slate-800">${Utils.formatDate(data.data_despesa)}</p></div>
          <div><p class="text-xs text-slate-500">Competência</p><p class="font-medium text-slate-800">${Utils.formatCompetencia(data.competencia)}</p></div>
          <div><p class="text-xs text-slate-500">Fornecedor</p><p class="font-medium text-slate-800">${data.fornecedor}</p></div>
          <div><p class="text-xs text-slate-500">Valor</p><p class="font-bold text-slate-900 text-base">${Utils.formatCurrency(data.valor)}</p></div>
          <div class="col-span-2"><p class="text-xs text-slate-500">Descrição</p><p class="text-slate-700">${data.descricao}</p></div>
          <div><p class="text-xs text-slate-500">Centro de Custo</p><p class="font-medium text-slate-800">${data.centros_custo?.nome || '–'}</p></div>
          <div><p class="text-xs text-slate-500">Conta de Despesa</p><p class="font-medium text-slate-800">${data.contas_despesa?.nome || '–'}</p></div>
          <div class="col-span-2"><p class="text-xs text-slate-500">Cartão</p><p class="font-medium text-slate-800">${data.cartoes_credito?.nome || '–'} ••••${data.cartoes_credito?.ultimos_4_digitos || ''}</p></div>
          ${data.observacao ? `<div class="col-span-2"><p class="text-xs text-slate-500">Observação</p><p class="text-slate-600">${data.observacao}</p></div>` : ''}
        </div>
        <div class="mt-4">
          <p class="text-xs font-medium text-slate-500 mb-2">ANEXOS (${data.despesa_anexos?.length || 0})</p>
          <div class="space-y-1.5">
            ${(data.despesa_anexos || []).map(a => `
              <div class="flex items-center justify-between px-3 py-2 bg-slate-50 rounded-lg border border-slate-200">
                <div class="flex items-center gap-2 min-w-0">
                  <svg class="w-4 h-4 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                  <p class="text-xs text-slate-700 truncate">${a.nome_arquivo}</p>
                </div>
                <button onclick="downloadAnexo('${a.storage_path}','${a.nome_arquivo}')" class="text-blue-600 text-xs font-medium ml-2 flex-shrink-0">Baixar</button>
              </div>`).join('') || '<p class="text-xs text-red-500">Sem anexos.</p>'}
          </div>
        </div>`;

      document.getElementById('secao-aprovacao').classList.remove('hidden');
      document.getElementById('modal').classList.remove('hidden');
    }

    function fecharModal() {
      document.getElementById('modal').classList.add('hidden');
      despesaAtual = null;
    }

    async function downloadAnexo(path, nome) {
      const { data, error } = await supabase.storage.from('despesas-anexos').download(path);
      if (error) { Utils.toast('Erro ao baixar.', 'error'); return; }
      const url = URL.createObjectURL(data);
      const a = document.createElement('a'); a.href = url; a.download = nome; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    async function aprovar() {
      if (!despesaAtual) return;
      if (reprovando) { reprovando = false; document.getElementById('motivo-wrap').classList.add('hidden'); return; }
      if (!confirm(`Aprovar despesa de ${Utils.formatCurrency(despesaAtual.valor)} de ${despesaAtual.usuarios?.nome}?`)) return;

      const { error } = await supabase.from('despesas').update({
        status: 'APROVADA',
        aprovado_por_usuario_id: currentUser.id,
        aprovado_em: new Date().toISOString(),
        motivo_reprovacao: null,
      }).eq('id', despesaAtual.id);

      if (error) { Utils.toast(error.message, 'error'); return; }
      Utils.toast('Despesa aprovada!', 'success');
      fecharModal();
      carregar();
    }

    async function reprovar() {
      if (!despesaAtual) return;
      if (!reprovando) {
        reprovando = true;
        document.getElementById('motivo-wrap').classList.remove('hidden');
        document.getElementById('btn-reprovar').textContent = 'Confirmar Reprovação';
        document.getElementById('motivo-input').focus();
        return;
      }
      const motivo = document.getElementById('motivo-input').value.trim();
      if (!motivo) { Utils.toast('Informe o motivo da reprovação.', 'error'); return; }

      const { error } = await supabase.from('despesas').update({
        status: 'REPROVADA',
        aprovado_por_usuario_id: currentUser.id,
        aprovado_em: new Date().toISOString(),
        motivo_reprovacao: motivo,
      }).eq('id', despesaAtual.id);

      if (error) { Utils.toast(error.message, 'error'); return; }
      Utils.toast('Despesa reprovada.', 'warning');
      fecharModal();
      carregar();
    }

    function limpar() {
      document.getElementById('f-comp').value = '';
      document.getElementById('f-centro').value = '';
      document.getElementById('f-usuario').value = '';
      carregar();
    }

    async function popularFiltros() {
      const [{ data: cc }, { data: usr }] = await Promise.all([
        supabase.from('centros_custo').select('id, nome').eq('ativo', true).order('nome'),
        supabase.from('usuarios').select('id, nome').eq('ativo', true).order('nome'),
      ]);
      Utils.populateSelect(document.getElementById('f-centro'), cc || [], 'id', 'nome');
      Utils.populateSelect(document.getElementById('f-usuario'), usr || [], 'id', 'nome');
    }

    (async () => {
      currentUser = await Layout.init('aprovacoes', ['ADMIN','GESTOR']);
      if (!currentUser) return;
      await popularFiltros();
      await carregar();
    })();
  </script>
</body>
</html>
