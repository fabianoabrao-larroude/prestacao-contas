<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios – Prestação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-slate-50">
  <div id="app-loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div><p class="text-sm text-slate-500">Carregando…</p></div>
  </div>
  <div id="app" class="hidden flex h-screen overflow-hidden">
    <div id="sidebar-container" class="flex-shrink-0"></div>
    <main class="flex-1 overflow-y-auto">
      <div class="p-6 max-w-7xl mx-auto">

        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">Relatórios</h1>
            <p class="text-sm text-slate-500 mt-1">Análise de despesas por período e categoria</p>
          </div>
          <button onclick="exportarCSV()" class="flex items-center gap-2 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Exportar CSV
          </button>
        </div>

        <!-- Abas de relatório -->
        <div class="flex gap-1 bg-slate-100 rounded-xl p-1 mb-5 overflow-x-auto">
          <button onclick="setAba('geral')"       id="aba-geral"       class="flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium transition-colors">Geral</button>
          <button onclick="setAba('centro')"      id="aba-centro"      class="flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium transition-colors">Por Centro</button>
          <button onclick="setAba('cartao')"      id="aba-cartao"      class="flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium transition-colors">Por Cartão</button>
          <button onclick="setAba('usuario')"     id="aba-usuario"     class="flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium transition-colors">Por Usuário</button>
          <button onclick="setAba('conta')"       id="aba-conta"       class="flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium transition-colors">Por Conta</button>
          <button onclick="setAba('financeiro')"  id="aba-financeiro"  class="flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium transition-colors">Financeiro</button>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-5">
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 items-end">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Data Inicial</label>
              <input id="f-data-ini" type="date" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Data Final</label>
              <input id="f-data-fim" type="date" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Competência</label>
              <input id="f-comp" type="month" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Status</label>
              <select id="f-status" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todos</option>
                <option>RASCUNHO</option>
                <option>ENVIADA</option>
                <option>APROVADA</option>
                <option>REPROVADA</option>
                <option>CANCELADA</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Centro de Custo</label>
              <select id="f-centro" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todos</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Cartão</label>
              <select id="f-cartao" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todos</option>
              </select>
            </div>
            <!-- Canceladas ocultas por padrão -->
            <div class="flex flex-col gap-1">
              <label class="block text-xs font-medium text-slate-600">Canceladas</label>
              <label class="flex items-center gap-2 py-1.5 text-sm text-slate-600 cursor-pointer">
                <input id="f-canceladas" type="checkbox" class="rounded text-blue-600">
                Incluir
              </label>
            </div>
            <div class="flex items-end gap-2">
              <button onclick="gerar()" class="flex-1 px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors">Gerar</button>
              <button onclick="limpar()" class="px-3 py-1.5 border border-slate-300 text-slate-600 rounded-lg text-sm hover:bg-slate-50">✕</button>
            </div>
          </div>
        </div>

        <!-- Cards de totais -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-5" id="cards-totais">
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <p class="text-xs text-slate-500">Total Geral</p>
            <p class="text-xl font-bold text-slate-900 mt-1" id="tot-geral">–</p>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <p class="text-xs text-green-600 font-medium">Aprovadas</p>
            <p class="text-xl font-bold text-slate-900 mt-1" id="tot-aprov">–</p>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <p class="text-xs text-blue-600 font-medium">Enviadas</p>
            <p class="text-xl font-bold text-slate-900 mt-1" id="tot-env">–</p>
          </div>
          <div class="bg-white rounded-xl border border-slate-200 p-4">
            <p class="text-xs text-slate-500">Registros</p>
            <p class="text-xl font-bold text-slate-900 mt-1" id="tot-qtd">–</p>
          </div>
        </div>

        <!-- Tabela resultado -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm" id="tabela-resultado">
              <thead id="thead-resultado" class="bg-slate-50 border-b border-slate-200"></thead>
              <tbody id="tbody-resultado" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    let abaAtual  = 'geral';
    let dadosExport = [];

    function setAba(aba) {
      abaAtual = aba;
      ['geral','centro','cartao','usuario','conta','financeiro'].forEach(a => {
        const btn = document.getElementById(`aba-${a}`);
        if (a === aba) btn.className = 'flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium bg-white text-blue-700 shadow-sm transition-colors';
        else           btn.className = 'flex-1 min-w-max px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-slate-900 transition-colors';
      });
      gerar();
    }

    function montarQuery() {
      const ini           = document.getElementById('f-data-ini').value;
      const fim           = document.getElementById('f-data-fim').value;
      const comp          = document.getElementById('f-comp').value;
      const status        = document.getElementById('f-status').value;
      const centro        = document.getElementById('f-centro').value;
      const cartao        = document.getElementById('f-cartao').value;
      const inclCanceladas = document.getElementById('f-canceladas').checked;

      // Campos base + novos campos de fornecedor e fiscal
      let q = supabase.from('despesas').select(`
        id, data_despesa, data_cadastro, competencia, periodo_contabil,
        fornecedor, descricao, valor, status, tipo_pagamento, numero_parcelas,
        status_fiscal, tipo_documento_fiscal, oc_os,
        fornecedor_compra_nome_snapshot, fornecedor_compra_cnpj_snapshot,
        fornecedor_compra_codigo_senda_snapshot,
        fornecedor_fiscal_nome_snapshot,  fornecedor_fiscal_cnpj_snapshot,
        fornecedor_fiscal_codigo_senda_snapshot,
        is_marketplace, motivo_cancelamento,
        usuarios!despesas_usuario_id_fkey(nome),
        centros_custo(nome), contas_despesa(nome),
        cartoes_credito(nome, ultimos_4_digitos),
        despesa_anexos(id)`);

      // CANCELADAS ocultas por padrão
      if (!inclCanceladas) q = q.neq('status', 'CANCELADA');

      if (ini)    q = q.gte('data_despesa', ini);
      if (fim)    q = q.lte('data_despesa', fim);
      if (comp)   q = q.eq('competencia', comp);
      if (status) q = q.eq('status', status);
      if (centro) q = q.eq('centro_custo_id', centro);
      if (cartao) q = q.eq('cartao_id', cartao);

      return q.order('data_despesa', { ascending: false });
    }

    // Retorna o fornecedor correto conforme o contexto do relatório.
    // fiscal=true → relatório fiscal/Senda: prioriza fornecedor_fiscal_nome_snapshot.
    // fiscal=false → relatório operacional: usa fornecedor_compra_nome_snapshot.
    function fornecedorLabel(d, fiscal = false) {
      if (fiscal) {
        return d.fornecedor_fiscal_nome_snapshot
          || d.fornecedor_compra_nome_snapshot
          || d.fornecedor || '–';
      }
      return d.fornecedor_compra_nome_snapshot || d.fornecedor || '–';
    }

    function fornecedorFiscalLabel(d) {
      if (!d.is_marketplace) return '–';
      return d.fornecedor_fiscal_nome_snapshot || '–';
    }

    async function gerar() {
      if (abaAtual === 'financeiro') { await gerarFinanceiro(); return; }

      const { data, error } = await montarQuery();
      if (error) { Utils.toast(error.message, 'error'); return; }
      const rows = data || [];

      // Totais excluem CANCELADAS do valor (mesmo que inclusão esteja ativa)
      const rowsAtivas = rows.filter(d => d.status !== 'CANCELADA');
      const totGeral = rowsAtivas.reduce((s, d) => s + Number(d.valor), 0);
      const totAprov = rowsAtivas.filter(d => d.status === 'APROVADA').reduce((s,d) => s + Number(d.valor), 0);
      const totEnv   = rowsAtivas.filter(d => d.status === 'ENVIADA').reduce((s,d) => s + Number(d.valor), 0);
      document.getElementById('tot-geral').textContent = Utils.formatCurrency(totGeral);
      document.getElementById('tot-aprov').textContent = Utils.formatCurrency(totAprov);
      document.getElementById('tot-env').textContent   = Utils.formatCurrency(totEnv);
      document.getElementById('tot-qtd').textContent   = rows.length;

      if (abaAtual === 'geral')   renderGeral(rows);
      if (abaAtual === 'centro')  renderAgrupado(rows, d => d.centros_custo?.nome || 'Sem centro', 'Centro de Custo');
      if (abaAtual === 'cartao')  renderAgrupado(rows, d => `${d.cartoes_credito?.nome || '–'} ••••${d.cartoes_credito?.ultimos_4_digitos || ''}`, 'Cartão');
      if (abaAtual === 'usuario') renderAgrupado(rows, d => d.usuarios?.nome || '–', 'Usuário');
      if (abaAtual === 'conta')   renderAgrupado(rows, d => d.contas_despesa?.nome || '–', 'Conta de Despesa');
    }

    function renderGeral(rows) {
      // Visão operacional: fornecedor da compra + fornecedor fiscal separado
      // Fornecedor fiscal só aparece quando is_marketplace = true
      document.getElementById('thead-resultado').innerHTML = `
        <tr>
          ${['Data','Competência','Usuário','Cartão','Centro','Conta',
             'Forn. Compra','Forn. Fiscal','Descrição','Tipo Pag.',
             'Valor','Status','Status Fiscal','Anexos']
            .map(h => `<th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider whitespace-nowrap">${h}</th>`).join('')}
        </tr>`;

      dadosExport = rows.map(d => ({
        'Data Despesa':       Utils.formatDate(d.data_despesa),
        'Competência':        Utils.formatCompetencia(d.competencia),
        'Usuário':            d.usuarios?.nome || '',
        'Cartão':             `${d.cartoes_credito?.nome || ''} ••••${d.cartoes_credito?.ultimos_4_digitos || ''}`,
        'Centro Custo':       d.centros_custo?.nome || '',
        'Conta Despesa':      d.contas_despesa?.nome || '',
        'Forn. Compra':       fornecedorLabel(d, false),
        'Forn. Fiscal':       fornecedorFiscalLabel(d),
        'CPF/CNPJ Forn. Compra': Utils.formatCpfCnpj(d.fornecedor_compra_cnpj_snapshot) || '',
        'CPF/CNPJ Forn. Fiscal': Utils.formatCpfCnpj(d.fornecedor_fiscal_cnpj_snapshot) || '',
        'Cód. Senda Fiscal':  d.fornecedor_fiscal_codigo_senda_snapshot || d.fornecedor_compra_codigo_senda_snapshot || '',
        'Descrição':          d.descricao,
        'OC/OS':              d.oc_os || '',
        'Tipo Pagamento':     d.tipo_pagamento || '',
        'Nº Parcelas':        d.numero_parcelas || '',
        'Tipo Documento':     d.tipo_documento_fiscal || '',
        'Valor':              d.valor,
        'Status':             d.status,
        'Status Fiscal':      d.status_fiscal || '',
        'Motivo Cancelamento': d.motivo_cancelamento || '',
        'Anexos':             d.despesa_anexos?.length || 0,
      }));

      const TIPO_PAG = { A_VISTA: 'À Vista', PARCELADO: 'Parcelado', ADIANTAMENTO: 'Adiantamento' };

      Utils.renderTable(document.getElementById('tbody-resultado'), rows, d => {
        const rowCls = d.status === 'CANCELADA' ? 'bg-slate-50 opacity-60' : '';
        return `
          <tr class="hover:bg-slate-50 ${rowCls}">
            <td class="px-4 py-3 text-slate-600 whitespace-nowrap">${Utils.formatDate(d.data_despesa)}</td>
            <td class="px-4 py-3 text-slate-600">${Utils.formatCompetencia(d.competencia)}</td>
            <td class="px-4 py-3 text-slate-700">${d.usuarios?.nome || '–'}</td>
            <td class="px-4 py-3 text-slate-600 text-xs whitespace-nowrap">${d.cartoes_credito?.nome || '–'} ••••${d.cartoes_credito?.ultimos_4_digitos || ''}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">${d.centros_custo?.nome || '–'}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">${d.contas_despesa?.nome || '–'}</td>
            <td class="px-4 py-3 font-medium text-slate-800 text-xs">${fornecedorLabel(d, false)}</td>
            <td class="px-4 py-3 text-slate-500 text-xs">${fornecedorFiscalLabel(d)}</td>
            <td class="px-4 py-3 text-slate-600 max-w-xs truncate">${d.descricao}</td>
            <td class="px-4 py-3 text-slate-500 text-xs whitespace-nowrap">${TIPO_PAG[d.tipo_pagamento] || '–'}</td>
            <td class="px-4 py-3 text-right font-medium text-slate-900 whitespace-nowrap">${Utils.formatCurrency(d.valor)}</td>
            <td class="px-4 py-3">${Utils.statusBadge(d.status)}</td>
            <td class="px-4 py-3 text-xs text-slate-500 whitespace-nowrap">${d.status_fiscal || '–'}</td>
            <td class="px-4 py-3 text-center text-slate-600">${d.despesa_anexos?.length || 0}</td>
          </tr>`;
      });
    }

    function renderAgrupado(rows, keyFn, colLabel) {
      const grupos = {};
      rows.forEach(d => {
        if (d.status === 'CANCELADA') return; // canceladas nunca entram nos totais agrupados
        const k = keyFn(d);
        if (!grupos[k]) grupos[k] = { label: k, total: 0, qtd: 0, aprovado: 0 };
        grupos[k].total += Number(d.valor);
        grupos[k].qtd++;
        if (d.status === 'APROVADA') grupos[k].aprovado += Number(d.valor);
      });
      const lista = Object.values(grupos).sort((a,b) => b.total - a.total);

      document.getElementById('thead-resultado').innerHTML = `
        <tr>
          ${[colLabel, 'Qtd Despesas', 'Total', 'Aprovado', '% do Total']
            .map(h => `<th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">${h}</th>`).join('')}
        </tr>`;

      const grandTotal = lista.reduce((s,g) => s + g.total, 0);

      dadosExport = lista.map(g => ({
        [colLabel]:     g.label,
        'Qtd Despesas': g.qtd,
        'Total':        g.total,
        'Aprovado':     g.aprovado,
        '% do Total':   grandTotal > 0 ? ((g.total / grandTotal) * 100).toFixed(1) + '%' : '0%',
      }));

      Utils.renderTable(document.getElementById('tbody-resultado'), lista, g => {
        const pct = grandTotal > 0 ? ((g.total / grandTotal) * 100).toFixed(1) : '0.0';
        return `
          <tr class="hover:bg-slate-50">
            <td class="px-4 py-3 font-medium text-slate-800">${g.label}</td>
            <td class="px-4 py-3 text-slate-600">${g.qtd}</td>
            <td class="px-4 py-3 font-semibold text-slate-900">${Utils.formatCurrency(g.total)}</td>
            <td class="px-4 py-3 text-green-700">${Utils.formatCurrency(g.aprovado)}</td>
            <td class="px-4 py-3">
              <div class="flex items-center gap-2">
                <div class="flex-1 bg-slate-200 rounded-full h-1.5 max-w-24">
                  <div class="bg-blue-500 h-1.5 rounded-full" style="width:${pct}%"></div>
                </div>
                <span class="text-xs text-slate-600">${pct}%</span>
              </div>
            </td>
          </tr>`;
      });
    }

    // ── Aba Financeiro: visão por parcela (despesa_parcelas) ──────────────
    // Mostra o fluxo de caixa real: despesas PARCELADO aparecem linha a linha
    // por parcela/período financeiro; A_VISTA e ADIANTAMENTO aparecem como
    // parcela única. Fornecedor fiscal priorizado (visão Senda/fiscal).
    async function gerarFinanceiro() {
      const ini           = document.getElementById('f-data-ini').value;
      const fim           = document.getElementById('f-data-fim').value;
      const comp          = document.getElementById('f-comp').value;
      const centro        = document.getElementById('f-centro').value;
      const cartao        = document.getElementById('f-cartao').value;
      const inclCanceladas = document.getElementById('f-canceladas').checked;

      // Busca despesas com parcelas
      let qDesp = supabase.from('despesas').select(`
        id, descricao, valor, status, tipo_pagamento, competencia, periodo_contabil,
        fornecedor, fornecedor_fiscal_nome_snapshot, fornecedor_fiscal_codigo_senda_snapshot,
        fornecedor_compra_nome_snapshot, fornecedor_compra_codigo_senda_snapshot,
        is_marketplace,
        usuarios!despesas_usuario_id_fkey(nome),
        centros_custo(nome), contas_despesa(nome),
        cartoes_credito(nome, ultimos_4_digitos),
        despesa_parcelas(numero_parcela, periodo_financeiro, valor_parcela, pago)`);

      if (!inclCanceladas) qDesp = qDesp.neq('status', 'CANCELADA');
      if (comp)   qDesp = qDesp.eq('competencia', comp);
      if (centro) qDesp = qDesp.eq('centro_custo_id', centro);
      if (cartao) qDesp = qDesp.eq('cartao_id', cartao);

      const { data: despesas, error } = await qDesp.order('data_despesa', { ascending: false });
      if (error) { Utils.toast(error.message, 'error'); return; }

      // Expande cada despesa nas suas parcelas (ou cria parcela fictícia única)
      const linhas = [];
      (despesas || []).forEach(d => {
        const parcelas = d.despesa_parcelas?.length
          ? d.despesa_parcelas.sort((a,b) => a.numero_parcela - b.numero_parcela)
          : [{ numero_parcela: 1, periodo_financeiro: d.periodo_contabil || d.competencia, valor_parcela: d.valor, pago: false }];

        parcelas.forEach(p => {
          if (ini && p.periodo_financeiro && p.periodo_financeiro < ini.substring(0,7)) return;
          if (fim && p.periodo_financeiro && p.periodo_financeiro > fim.substring(0,7)) return;
          linhas.push({
            periodo_financeiro: p.periodo_financeiro,
            parcela:            `${p.numero_parcela}/${parcelas.length}`,
            pago:               p.pago,
            valor_parcela:      p.valor_parcela,
            descricao:          d.descricao,
            tipo_pagamento:     d.tipo_pagamento,
            status:             d.status,
            usuario:            d.usuarios?.nome || '–',
            centro:             d.centros_custo?.nome || '–',
            conta:              d.contas_despesa?.nome || '–',
            cartao:             `${d.cartoes_credito?.nome || '–'} ••••${d.cartoes_credito?.ultimos_4_digitos || ''}`,
            // Visão fiscal: prioriza fornecedor_fiscal
            fornecedor_fiscal:  d.fornecedor_fiscal_nome_snapshot || d.fornecedor_compra_nome_snapshot || d.fornecedor || '–',
            codigo_senda:       d.fornecedor_fiscal_codigo_senda_snapshot || d.fornecedor_compra_codigo_senda_snapshot || '–',
          });
        });
      });

      linhas.sort((a,b) => (a.periodo_financeiro || '').localeCompare(b.periodo_financeiro || ''));

      const totFin = linhas.filter(l => l.status !== 'CANCELADA').reduce((s,l) => s + Number(l.valor_parcela), 0);
      document.getElementById('tot-geral').textContent = Utils.formatCurrency(totFin);
      document.getElementById('tot-aprov').textContent = '–';
      document.getElementById('tot-env').textContent   = '–';
      document.getElementById('tot-qtd').textContent   = linhas.length;

      document.getElementById('thead-resultado').innerHTML = `
        <tr>
          ${['Período Fin.','Parcela','Usuário','Cartão','Centro','Conta',
             'Fornecedor (Fiscal/Senda)','Cód. Senda','Descrição','Tipo Pag.','Valor','Pago','Status']
            .map(h => `<th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider whitespace-nowrap">${h}</th>`).join('')}
        </tr>`;

      dadosExport = linhas.map(l => ({
        'Período Financeiro': l.periodo_financeiro || '',
        'Parcela':            l.parcela,
        'Usuário':            l.usuario,
        'Cartão':             l.cartao,
        'Centro Custo':       l.centro,
        'Conta Despesa':      l.conta,
        'Fornecedor Fiscal':  l.fornecedor_fiscal,
        'Cód. Senda':         l.codigo_senda,
        'Descrição':          l.descricao,
        'Tipo Pagamento':     l.tipo_pagamento || '',
        'Valor Parcela':      l.valor_parcela,
        'Pago':               l.pago ? 'Sim' : 'Não',
        'Status Despesa':     l.status,
      }));

      const TIPO_PAG = { A_VISTA: 'À Vista', PARCELADO: 'Parcelado', ADIANTAMENTO: 'Adiantamento' };

      Utils.renderTable(document.getElementById('tbody-resultado'), linhas, l => {
        const rowCls = l.status === 'CANCELADA' ? 'bg-slate-50 opacity-60' : '';
        const pagoBadge = l.pago
          ? '<span class="px-2 py-0.5 rounded-full text-xs bg-green-50 text-green-700 border border-green-200">Pago</span>'
          : '<span class="px-2 py-0.5 rounded-full text-xs bg-slate-50 text-slate-500 border border-slate-200">Pendente</span>';
        return `
          <tr class="hover:bg-slate-50 ${rowCls}">
            <td class="px-4 py-3 font-mono text-xs text-slate-600 whitespace-nowrap">${l.periodo_financeiro || '–'}</td>
            <td class="px-4 py-3 text-xs text-slate-500 text-center">${l.parcela}</td>
            <td class="px-4 py-3 text-slate-700 text-xs">${l.usuario}</td>
            <td class="px-4 py-3 text-slate-600 text-xs whitespace-nowrap">${l.cartao}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">${l.centro}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">${l.conta}</td>
            <td class="px-4 py-3 font-medium text-slate-800 text-xs">${l.fornecedor_fiscal}</td>
            <td class="px-4 py-3 font-mono text-xs text-slate-500">${l.codigo_senda}</td>
            <td class="px-4 py-3 text-slate-600 max-w-xs truncate">${l.descricao}</td>
            <td class="px-4 py-3 text-xs text-slate-500">${TIPO_PAG[l.tipo_pagamento] || '–'}</td>
            <td class="px-4 py-3 text-right font-semibold text-slate-900 whitespace-nowrap">${Utils.formatCurrency(l.valor_parcela)}</td>
            <td class="px-4 py-3">${pagoBadge}</td>
            <td class="px-4 py-3">${Utils.statusBadge(l.status)}</td>
          </tr>`;
      });
    }

    function exportarCSV() {
      if (!dadosExport.length) { Utils.toast('Gere o relatório antes de exportar.', 'warning'); return; }
      const nomeAba = { geral:'geral', centro:'por_centro', cartao:'por_cartao', usuario:'por_usuario', conta:'por_conta', financeiro:'financeiro_parcelas' };
      Utils.exportCSV(dadosExport, `relatorio_${nomeAba[abaAtual]}_${new Date().toISOString().split('T')[0]}.csv`);
    }

    function limpar() {
      ['f-data-ini','f-data-fim','f-comp','f-status','f-centro','f-cartao']
        .forEach(id => { document.getElementById(id).value = ''; });
      document.getElementById('f-canceladas').checked = false;
      gerar();
    }

    async function popularFiltros() {
      const [{ data: cc }, { data: cart }] = await Promise.all([
        supabase.from('centros_custo').select('id, nome').eq('ativo', true).order('nome'),
        supabase.from('cartoes_credito').select('id, nome, ultimos_4_digitos').eq('ativo', true).order('nome'),
      ]);
      Utils.populateSelect(document.getElementById('f-centro'), cc || [], 'id', 'nome');
      const selCart = document.getElementById('f-cartao');
      selCart.innerHTML = '<option value="">Todos</option>';
      (cart || []).forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.id;
        opt.textContent = `${c.nome} ••••${c.ultimos_4_digitos}`;
        selCart.appendChild(opt);
      });
    }

    (async () => {
      const user = await Layout.init('relatorios', ['ADMIN','GESTOR']);
      if (!user) return;
      await popularFiltros();
      setAba('geral');
    })();
  </script>
</body>
</html>
