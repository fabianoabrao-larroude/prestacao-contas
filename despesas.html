<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minhas Despesas – Prestação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-slate-50">
  <div id="app-loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div><p class="text-sm text-slate-500">Carregando…</p></div>
  </div>
  <div id="app" class="hidden flex h-screen overflow-hidden">
    <div id="sidebar-container" class="flex-shrink-0"></div>
    <main class="flex-1 overflow-y-auto">
      <div class="p-6 max-w-7xl mx-auto">

        <div class="flex items-center justify-between mb-6">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">Minhas Despesas</h1>
            <p class="text-sm text-slate-500 mt-1">Acompanhe e gerencie suas despesas</p>
          </div>
          <a href="despesa-form.html" class="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Nova Despesa
          </a>
        </div>

        <!-- Filtros -->
        <div class="bg-white rounded-xl border border-slate-200 p-4 mb-5">
          <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Competência</label>
              <input id="f-competencia" type="month" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
              <label class="block text-xs font-medium text-slate-600 mb-1">Status</label>
              <select id="f-status" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Todos</option>
                <option>RASCUNHO</option><option>ENVIADA</option><option>APROVADA</option><option>REPROVADA</option>
              </select>
            </div>
            <div class="col-span-2">
              <label class="block text-xs font-medium text-slate-600 mb-1">Buscar</label>
              <input id="f-busca" type="text" placeholder="Fornecedor ou descrição…" class="w-full px-2 py-1.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex items-end gap-2 col-span-2">
              <button onclick="carregar()" class="flex-1 px-3 py-1.5 bg-blue-600 text-white rounded-lg text-sm hover:bg-blue-700 transition-colors">Filtrar</button>
              <button onclick="limparFiltros()" class="px-3 py-1.5 border border-slate-300 text-slate-600 rounded-lg text-sm hover:bg-slate-50 transition-colors">Limpar</button>
            </div>
          </div>
        </div>

        <!-- Tabela -->
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="overflow-x-auto">
            <table class="w-full text-sm">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Data</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Competência</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Fornecedor</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Centro de Custo</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Conta</th>
                  <th class="text-right px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Valor</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Anexos</th>
                  <th class="text-left px-4 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wider">Ações</th>
                </tr>
              </thead>
              <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <div class="px-4 py-3 border-t border-slate-100 flex items-center justify-between">
            <p class="text-xs text-slate-500" id="total-info">–</p>
            <p class="text-sm font-semibold text-slate-800" id="total-valor">–</p>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script>
    let currentUser = null;

    async function carregar() {
      const comp   = document.getElementById('f-competencia').value;
      const status = document.getElementById('f-status').value;
      const busca  = document.getElementById('f-busca').value.trim().toLowerCase();

      let q = supabase
        .from('despesas')
        .select(`id, data_despesa, competencia, fornecedor, descricao, valor, status,
                 centros_custo(nome), contas_despesa(nome),
                 despesa_anexos(id)`)
        .order('data_despesa', { ascending: false });

      if (comp)   q = q.eq('competencia', comp);
      if (status) q = q.eq('status', status);

      const { data, error } = await q;
      if (error) { Utils.toast(error.message, 'error'); return; }

      let rows = data || [];
      if (busca) rows = rows.filter(d =>
        d.fornecedor.toLowerCase().includes(busca) || d.descricao.toLowerCase().includes(busca));

      const total = rows.reduce((s, d) => s + Number(d.valor), 0);
      document.getElementById('total-info').textContent  = `${rows.length} registro(s)`;
      document.getElementById('total-valor').textContent = `Total: ${Utils.formatCurrency(total)}`;

      Utils.renderTable(document.getElementById('tbody'), rows, d => {
        const editavel = ['RASCUNHO', 'REPROVADA'].includes(d.status);
        const qtdAnexos = d.despesa_anexos?.length || 0;
        return `
          <tr class="hover:bg-slate-50">
            <td class="px-4 py-3 text-slate-600 whitespace-nowrap">${Utils.formatDate(d.data_despesa)}</td>
            <td class="px-4 py-3 text-slate-600">${Utils.formatCompetencia(d.competencia)}</td>
            <td class="px-4 py-3 font-medium text-slate-800">${d.fornecedor}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">${d.centros_custo?.nome || '–'}</td>
            <td class="px-4 py-3 text-slate-600 text-xs">${d.contas_despesa?.nome || '–'}</td>
            <td class="px-4 py-3 text-right font-medium text-slate-900 whitespace-nowrap">${Utils.formatCurrency(d.valor)}</td>
            <td class="px-4 py-3">${Utils.statusBadge(d.status)}</td>
            <td class="px-4 py-3">
              <span class="inline-flex items-center gap-1 text-xs ${qtdAnexos > 0 ? 'text-slate-600' : 'text-red-500'}">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"/></svg>
                ${qtdAnexos}
              </span>
            </td>
            <td class="px-4 py-3 whitespace-nowrap">
              <a href="despesa-form.html?id=${d.id}" class="text-blue-600 hover:text-blue-800 text-xs font-medium mr-2">
                ${editavel ? 'Editar' : 'Ver'}
              </a>
            </td>
          </tr>`;
      });
    }

    function limparFiltros() {
      document.getElementById('f-competencia').value = '';
      document.getElementById('f-status').value = '';
      document.getElementById('f-busca').value = '';
      carregar();
    }

    (async () => {
      currentUser = await Layout.init('despesas');
      if (!currentUser) return;

      // Pré-preencher competência com mês atual
      const hoje = new Date();
      document.getElementById('f-competencia').value =
        `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,'0')}`;

      await carregar();
    })();
  </script>
</body>
</html>
