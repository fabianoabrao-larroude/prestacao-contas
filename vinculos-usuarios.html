<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vínculos de Usuários – Prestação de Contas</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/layout.js"></script>
</head>
<body class="bg-slate-50">
  <div id="app-loading" class="fixed inset-0 bg-white flex items-center justify-center z-50">
    <div class="text-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div><p class="text-sm text-slate-500">Carregando…</p></div>
  </div>
  <div id="app" class="hidden flex h-screen overflow-hidden">
    <div id="sidebar-container" class="flex-shrink-0"></div>
    <main class="flex-1 overflow-y-auto">
      <div class="p-6 max-w-5xl mx-auto">
        <div class="mb-6">
          <h1 class="text-2xl font-bold text-slate-900">Vínculos de Usuários</h1>
          <p class="text-sm text-slate-500 mt-1">Gerencie centros de custo e cartões vinculados a cada usuário</p>
        </div>

        <!-- Seletor de usuário -->
        <div class="bg-white rounded-xl border border-slate-200 p-5 mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-2">Selecione o usuário</label>
          <div class="flex gap-3">
            <select id="sel-usuario" class="flex-1 px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
              <option value="">Selecione um usuário…</option>
            </select>
            <button onclick="carregarVinculos()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">
              Carregar
            </button>
          </div>
        </div>

        <!-- Vínculos -->
        <div id="area-vinculos" class="hidden">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

            <!-- Centros de Custo -->
            <div class="bg-white rounded-xl border border-slate-200">
              <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-sm font-semibold text-slate-800">Centros de Custo</h2>
                <button onclick="abrirModalCentro()" class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                  Vincular
                </button>
              </div>
              <div id="lista-centros" class="divide-y divide-slate-100">
                <p class="px-5 py-4 text-sm text-slate-400">Nenhum vínculo.</p>
              </div>
            </div>

            <!-- Cartões -->
            <div class="bg-white rounded-xl border border-slate-200">
              <div class="px-5 py-4 border-b border-slate-100 flex items-center justify-between">
                <h2 class="text-sm font-semibold text-slate-800">Cartões de Crédito</h2>
                <button onclick="abrirModalCartao()" class="text-xs text-blue-600 hover:text-blue-800 font-medium flex items-center gap-1">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                  Vincular
                </button>
              </div>
              <div id="lista-cartoes" class="divide-y divide-slate-100">
                <p class="px-5 py-4 text-sm text-slate-400">Nenhum vínculo.</p>
              </div>
            </div>

          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Vincular Centro -->
  <div id="modal-centro" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-900">Vincular Centro de Custo</h2>
        <button onclick="fecharModal('modal-centro')" class="text-slate-400 hover:text-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Centro de Custo *</label>
          <select id="sel-centro" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Papel no Centro *</label>
          <select id="sel-papel" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="MEMBRO">Membro</option>
            <option value="GESTOR">Gestor</option>
          </select>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="fecharModal('modal-centro')" class="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50 transition-colors">Cancelar</button>
          <button onclick="vincularCentro()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">Vincular</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Vincular Cartão -->
  <div id="modal-cartao" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md mx-4">
      <div class="px-6 py-4 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-900">Vincular Cartão</h2>
        <button onclick="fecharModal('modal-cartao')" class="text-slate-400 hover:text-slate-600"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
      <div class="px-6 py-5 space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">Cartão *</label>
          <select id="sel-cartao" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></select>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="fecharModal('modal-cartao')" class="flex-1 px-4 py-2 border border-slate-300 text-slate-700 rounded-lg text-sm hover:bg-slate-50 transition-colors">Cancelar</button>
          <button onclick="vincularCartao()" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors">Vincular</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let centrosTodos = [], cartoesTodos = [];
    let vinculosCentros = [], vinculosCartoes = [];

    async function inicializar() {
      const [{ data: usuarios }, { data: cc }, { data: cart }] = await Promise.all([
        supabase.from('usuarios').select('id, nome, email, perfil').eq('ativo', true).order('nome'),
        supabase.from('centros_custo').select('id, codigo, nome').eq('ativo', true).order('nome'),
        supabase.from('cartoes_credito').select('id, nome, ultimos_4_digitos').eq('ativo', true).order('nome'),
      ]);
      centrosTodos = cc || []; cartoesTodos = cart || [];

      const sel = document.getElementById('sel-usuario');
      (usuarios || []).forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = `${u.nome} (${u.perfil})`;
        sel.appendChild(opt);
      });
    }

    async function carregarVinculos() {
      const uid = document.getElementById('sel-usuario').value;
      if (!uid) { Utils.toast('Selecione um usuário.', 'warning'); return; }

      const [{ data: vc }, { data: vcar }] = await Promise.all([
        supabase.from('usuario_centros_custo').select('id, papel_no_centro, ativo, centros_custo(id, codigo, nome)').eq('usuario_id', uid),
        supabase.from('usuario_cartoes').select('id, ativo, cartoes_credito(id, nome, ultimos_4_digitos)').eq('usuario_id', uid),
      ]);

      vinculosCentros = vc || []; vinculosCartoes = vcar || [];
      renderVinculos();
      document.getElementById('area-vinculos').classList.remove('hidden');
    }

    function renderVinculos() {
      const papelBadge = p => p === 'GESTOR'
        ? '<span class="px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">GESTOR</span>'
        : '<span class="px-2 py-0.5 rounded text-xs font-medium bg-slate-100 text-slate-700">MEMBRO</span>';

      const listaCentros = document.getElementById('lista-centros');
      if (!vinculosCentros.length) {
        listaCentros.innerHTML = '<p class="px-5 py-4 text-sm text-slate-400">Nenhum centro vinculado.</p>';
      } else {
        listaCentros.innerHTML = vinculosCentros.map(v => `
          <div class="flex items-center justify-between px-5 py-3">
            <div>
              <p class="text-sm font-medium text-slate-800">${v.centros_custo?.nome || '–'}</p>
              <div class="mt-1">${papelBadge(v.papel_no_centro)}</div>
            </div>
            <div class="flex items-center gap-2">
              ${Utils.ativoBadge(v.ativo)}
              <button onclick="toggleVinculoCentro('${v.id}', ${v.ativo})" class="text-xs ${v.ativo ? 'text-red-600 hover:text-red-800' : 'text-green-600 hover:text-green-800'} font-medium">
                ${v.ativo ? 'Desvincular' : 'Reativar'}
              </button>
            </div>
          </div>`).join('');
      }

      const listaCartoes = document.getElementById('lista-cartoes');
      if (!vinculosCartoes.length) {
        listaCartoes.innerHTML = '<p class="px-5 py-4 text-sm text-slate-400">Nenhum cartão vinculado.</p>';
      } else {
        listaCartoes.innerHTML = vinculosCartoes.map(v => `
          <div class="flex items-center justify-between px-5 py-3">
            <div>
              <p class="text-sm font-medium text-slate-800">${v.cartoes_credito?.nome || '–'}</p>
              <p class="text-xs text-slate-500">••••&nbsp;${v.cartoes_credito?.ultimos_4_digitos || ''}</p>
            </div>
            <div class="flex items-center gap-2">
              ${Utils.ativoBadge(v.ativo)}
              <button onclick="toggleVinculoCartao('${v.id}', ${v.ativo})" class="text-xs ${v.ativo ? 'text-red-600 hover:text-red-800' : 'text-green-600 hover:text-green-800'} font-medium">
                ${v.ativo ? 'Desvincular' : 'Reativar'}
              </button>
            </div>
          </div>`).join('');
      }
    }

    function abrirModalCentro() {
      const vinculadosIds = vinculosCentros.filter(v => v.ativo).map(v => v.centros_custo?.id);
      const disponiveis = centrosTodos.filter(c => !vinculadosIds.includes(c.id));
      Utils.populateSelect(document.getElementById('sel-centro'), disponiveis, 'id', 'nome');
      document.getElementById('modal-centro').classList.remove('hidden');
    }

    function abrirModalCartao() {
      const vinculadosIds = vinculosCartoes.filter(v => v.ativo).map(v => v.cartoes_credito?.id);
      const disponiveis = cartoesTodos.filter(c => !vinculadosIds.includes(c.id));
      Utils.populateSelect(document.getElementById('sel-cartao'), disponiveis, 'id', 'nome');
      document.getElementById('modal-cartao').classList.remove('hidden');
    }

    function fecharModal(id) { document.getElementById(id).classList.add('hidden'); }

    async function vincularCentro() {
      const uid        = document.getElementById('sel-usuario').value;
      const centroId   = document.getElementById('sel-centro').value;
      const papel      = document.getElementById('sel-papel').value;
      if (!centroId) { Utils.toast('Selecione um centro.', 'warning'); return; }

      const { error } = await supabase.from('usuario_centros_custo').upsert(
        { usuario_id: uid, centro_custo_id: centroId, papel_no_centro: papel, ativo: true },
        { onConflict: 'usuario_id,centro_custo_id' }
      );
      if (error) { Utils.toast(error.message, 'error'); return; }
      Utils.toast('Centro vinculado!');
      fecharModal('modal-centro');
      await carregarVinculos();
    }

    async function vincularCartao() {
      const uid      = document.getElementById('sel-usuario').value;
      const cartaoId = document.getElementById('sel-cartao').value;
      if (!cartaoId) { Utils.toast('Selecione um cartão.', 'warning'); return; }

      const { error } = await supabase.from('usuario_cartoes').upsert(
        { usuario_id: uid, cartao_id: cartaoId, ativo: true },
        { onConflict: 'usuario_id,cartao_id' }
      );
      if (error) { Utils.toast(error.message, 'error'); return; }
      Utils.toast('Cartão vinculado!');
      fecharModal('modal-cartao');
      await carregarVinculos();
    }

    async function toggleVinculoCentro(id, ativo) {
      const { error } = await supabase.from('usuario_centros_custo').update({ ativo: !ativo }).eq('id', id);
      if (error) { Utils.toast(error.message, 'error'); return; }
      Utils.toast(ativo ? 'Vínculo desativado.' : 'Vínculo reativado.');
      await carregarVinculos();
    }

    async function toggleVinculoCartao(id, ativo) {
      const { error } = await supabase.from('usuario_cartoes').update({ ativo: !ativo }).eq('id', id);
      if (error) { Utils.toast(error.message, 'error'); return; }
      Utils.toast(ativo ? 'Vínculo desativado.' : 'Vínculo reativado.');
      await carregarVinculos();
    }

    (async () => {
      const user = await Layout.init('vinculos-usuarios', ['ADMIN']);
      if (!user) return;
      await inicializar();
    })();
  </script>
</body>
</html>
